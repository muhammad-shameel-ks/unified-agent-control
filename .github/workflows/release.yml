name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debian:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Unified Agent Control ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-bundle
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-bundle
          path: src-tauri/target/release/bundle/appimage/*.AppImage*

  build-arch:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
      options: --user root
    env:
      CARGO_HOME: /root/.cargo
    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git webkit2gtk-4.1 appmenu-gtk-module libappindicator-gtk3 librsvg patchelf nodejs npm curl

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: /root/.local/share/pnpm/store/v10
          key: ${{ runner.os }}-arch-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-arch-pnpm-store-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/registry
            /root/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-arch-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arch-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          source "$HOME/.cargo/env"
          pnpm tauri build

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-bundle
          path: src-tauri/target/release/bundle/pacman/*.pkg.tar.zst

  build-fedora:
    runs-on: ubuntu-22.04
    container:
      image: fedora:latest
      options: --user root
    env:
      CARGO_HOME: /root/.cargo
    steps:
      - name: Install base dependencies
        run: |
          dnf install -y git webkit2gtk4.1-devel libappindicator-gtk3-devel librsvg2-devel patchelf openssl-devel nodejs npm curl gcc

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: /root/.local/share/pnpm/store/v10
          key: ${{ runner.os }}-fedora-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-fedora-pnpm-store-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/registry
            /root/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-fedora-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-fedora-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          source "$HOME/.cargo/env"
          pnpm tauri build

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-bundle
          path: src-tauri/target/release/bundle/rpm/*.rpm
